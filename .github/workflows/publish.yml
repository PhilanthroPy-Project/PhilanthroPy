name: Publish to PyPI

# Trusted Publishing (OIDC) — no API token is stored anywhere.
# Fires ONLY when a GitHub Release is *published* (from a v*.*.* tag), so
# pushing a tag alone never publishes: you keep a manual gate by clicking
# "Publish release" in the GitHub UI.
#
# One-time PyPI setup (done in the pypi.org project settings, not here):
#   Publishing -> Add a new pending publisher:
#     Owner:        PhilanthroPy-Project
#     Repository:   PhilanthroPy
#     Workflow:     publish.yml
#     Environment:  pypi
on:
  release:
    types: [published]

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build backend
        run: python -m pip install --upgrade build
      - name: Build distributions
        run: python -m build
      - name: Verify metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/philanthropy
    permissions:
      id-token: write   # REQUIRED for OIDC trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
