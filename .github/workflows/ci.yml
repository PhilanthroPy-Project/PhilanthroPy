name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev deps
        run: pip install -e ".[dev]"
      - name: Check for import/collection errors (fast gate)
        run: |
          python -m pytest tests/ --collect-only -q || {
            echo "FATAL: Collection errors found. A test imports a class that does not exist."
            echo "Run: pytest tests/ --collect-only -q"
            echo "Fix all ImportErrors before pushing."
            exit 1
          }
      - name: Run test suite
        run: pytest tests/ -v --tb=short
      - name: Coverage gate
        run: pytest tests/ --cov=philanthropy --cov-fail-under=85 --cov-report=term-missing
